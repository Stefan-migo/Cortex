# cortex — OpenHarness Configuration
# Este archivo configura cortex para usar OpenHarness como runtime.
# OpenHarness: standalone agent harness (Python, pip install openharness-ai)
# Más info: https://github.com/HKUDS/OpenHarness

harness:
  version: "0.1.9"
  provider: "claude"  # Usa Claude API (requiere ANTHROPIC_API_KEY)
  
  # Modo de operación: standalone | agent-loop
  mode: "agent-loop"
  
  # Skills a cargar
  skills:
    - "sdd-skill"        # Spec-Driven Development
    - "cortex-lobe"       # Brain lobe architecture
  
  # MCP Servers
  mcp_servers:
    engram:
      command: "engram"
      args: ["mcp"]
      description: "Persistent memory (SQLite + FTS5)"
    graphify:
      command: "graphify"
      args: ["mcp"]
      description: "Codebase knowledge graph"
  
  # Tools
  tools:
    enabled: true
  
  # Permissions
  permissions:
    read: true
    write: true        # Con confirmación
    bash: true         # Con confirmación
    edit: true         # Con confirmación
